// ===== Sound Engine (Web Audio API) =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume || 0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playCorrect() {
  playTone(523, 0.12, 'sine', 0.15);
  setTimeout(() => playTone(659, 0.12, 'sine', 0.15), 100);
  setTimeout(() => playTone(784, 0.2, 'sine', 0.15), 200);
}
function playWrong() {
  playTone(330, 0.2, 'sawtooth', 0.1);
  setTimeout(() => playTone(262, 0.35, 'sawtooth', 0.1), 150);
}
function playClick() { playTone(880, 0.04, 'sine', 0.08); }
function playTimerWarning() { playTone(440, 0.08, 'square', 0.06); }
function playFanfare() {
  const notes = [523, 587, 659, 784, 659, 784, 1047];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 0.18, 'sine', 0.15), i * 100));
}
function playTimeout() {
  playTone(200, 0.3, 'sawtooth', 0.1);
  setTimeout(() => playTone(160, 0.5, 'sawtooth', 0.1), 250);
}

// ===== Confetti Engine =====
let confettiAnimId = null;
function startConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const rect = document.getElementById('resultScreen').getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  const ctx = canvas.getContext('2d');
  const pieces = [];
  const colors = ['#ffd700','#ff6b6b','#4a7c5c','#ffa94d','#74c0fc','#da77f2','#20c997'];
  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: 4 + Math.random() * 6,
      h: 6 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: 1 + Math.random() * 2,
      vx: (Math.random() - 0.5) * 1.5,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 6,
    });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    let active = false;
    pieces.forEach(p => {
      p.y += p.vy + 0.03 * frame;
      p.x += p.vx;
      p.rot += p.vr;
      if (p.y < canvas.height + 20) active = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (active && frame < 300) confettiAnimId = requestAnimationFrame(draw);
  }
  if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
  draw();
}
function stopConfetti() {
  if (confettiAnimId) { cancelAnimationFrame(confettiAnimId); confettiAnimId = null; }
}

// ===== Game State =====
let currentStage = 0;
let score = 0;
let selected = false;
let totalStages = stages.length;
let resultData = [];
let timerInterval = null;
let timeLeft = 15;
let TIMER_SECONDS = 15;
let scorePopTimeout = null;

// ===== Timer =====
function startTimer() {
  clearTimer();
  timeLeft = TIMER_SECONDS;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 5 && timeLeft > 0) playTimerWarning();
    if (timeLeft <= 0) {
      clearTimer();
      handleTimeout();
    }
  }, 1000);
}
function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
function updateTimerDisplay() {
  document.getElementById("timerDisplay").textContent = timeLeft;
  const bar = document.getElementById("timerBar");
  const pct = (timeLeft / TIMER_SECONDS) * 100;
  bar.style.width = pct + "%";
  bar.className = "timer-bar";
  if (timeLeft <= 3) bar.classList.add("danger");
  else if (timeLeft <= 7) bar.classList.add("warn");
  else bar.classList.add("safe");
  const box = document.getElementById("timerBox");
  box.classList.toggle("warning", timeLeft <= 3);
}
function handleTimeout() {
  if (selected) return;
  playTimeout();
  selected = true;
  const s = stages[currentStage];
  const btns = document.querySelectorAll(".choice-btn");
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (s.choices[i].correct) btn.classList.add("correct-disabled");
  });
  const feedback = document.getElementById("feedback");
  feedback.className = "feedback show bad";
  feedback.innerHTML = `⏰ 時間到！<br>${s.wrongMsg} <div class="fun-fact">${s.funFact}</div>`;
  resultData.push({ stage: currentStage, correct: false });
  document.getElementById("nextBtn").classList.add("show");
  document.getElementById("nextBtn").onclick = goNext;
}

// ===== Rendering =====
function renderStage() {
  clearTimer();
  selected = false;
  const s = stages[currentStage];
  const progress = ((currentStage) / totalStages) * 100;
  document.getElementById("progressFill").style.width = progress + "%";

  const area = document.getElementById("sceneArea");
  area.innerHTML = `
    <div class="scene-illustration">${s.emoji}</div>
    <div class="scene-title">第 ${currentStage+1}/${totalStages} 關：${s.title}</div>
    <div class="scene-text">${s.text}</div>
    <div class="choices" id="choicesContainer">
      ${s.choices.map((c, i) => `
        <button class="choice-btn" data-idx="${i}">${c.label}</button>
      `).join("")}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">➡️ 繼續前進</button>
  `;

  document.querySelectorAll(".choice-btn").forEach(btn => {
    btn.addEventListener("click", function(e) {
      if (selected) return;
      playClick();
      const idx = parseInt(this.dataset.idx);
      handleChoice(idx, e);
    });
  });

  startTimer();
}

// ===== Choice Handling =====
function handleChoice(idx, event) {
  clearTimer();
  selected = true;
  const s = stages[currentStage];
  const chosen = s.choices[idx];
  const feedback = document.getElementById("feedback");
  const btns = document.querySelectorAll(".choice-btn");

  // Ripple effect
  if (event) {
    const btn = event.currentTarget;
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement("span");
    ripple.className = "ripple";
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + "px";
    ripple.style.left = (event.clientX - rect.left - size/2) + "px";
    ripple.style.top = (event.clientY - rect.top - size/2) + "px";
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === idx && chosen.correct) btn.classList.add("correct-disabled");
    else if (i === idx && !chosen.correct) btn.classList.add("wrong-disabled");
    else if (s.choices[i].correct) btn.classList.add("correct-disabled");
  });

  if (chosen.correct) {
    score += 100 / totalStages;
    feedback.className = "feedback show good";
    feedback.innerHTML = `✅ ${s.correctMsg} <div class="fun-fact">${s.funFact}</div>`;
    resultData.push({ stage: currentStage, correct: true });
    playCorrect();
  } else {
    feedback.className = "feedback show bad";
    feedback.innerHTML = `❌ ${s.wrongMsg} <div class="fun-fact">${s.funFact}</div>`;
    resultData.push({ stage: currentStage, correct: false });
    playWrong();
  }

  score = Math.round(score);
  const scoreEl = document.getElementById("scoreDisplay");
  scoreEl.textContent = score;
  scoreEl.classList.add("pop");
  if (scorePopTimeout) clearTimeout(scorePopTimeout);
  scorePopTimeout = setTimeout(() => scoreEl.classList.remove("pop"), 300);

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.classList.add("show");
  nextBtn.onclick = goNext;
}

function goNext() {
  clearTimer();
  currentStage++;
  selected = false;
  if (currentStage >= totalStages) {
    showResult();
  } else {
    renderStage();
  }
}

// ===== Result =====
function showResult() {
  clearTimer();
  stopConfetti();
  document.getElementById("sceneArea").style.display = "none";
  document.getElementById("progressFill").style.width = "100%";

  const pct = score;
  document.getElementById("resultScore").textContent = score;
  document.getElementById("scoreDisplay").textContent = score;

  const corrects = resultData.filter(r => r.correct).length;

    badgeHtml = `<span class="badge bronze">📚 保育學徒</span>`;

    badgeHtml = `<span class="badge" style="background:#888;color:#fff;">🌱 學習中</span>`;
  }

  document.getElementById("resultEmoji").textContent = emoji;
  document.getElementById("resultTitle").textContent = title;
  document.getElementById("resultDesc").textContent = desc;
  document.getElementById("badgeContainer").innerHTML = badgeHtml;

  let detail = "";
  stages.forEach((s, i) => {
    const r = resultData[i];
    const status = r && r.correct ? "✅" : "❌";
    detail += `<span>${status} ${s.title}</span>`;
  });
  document.getElementById("resultDetail").innerHTML = detail + "<br><br>" +
    "💡 臺灣穿山甲小檔案：<br>" +
    "• 保育等級：🟡 二級珍貴稀有保育類<br>" +
    "• IUCN 狀態：🔴 極度瀕危（CR）<br>" +
    "• 主食：🐜 螞蟻、白蟻（一年吃 3000 萬隻）<br>" +
    "• 臺灣數量：約 2 萬隻，是全球保育基地！<br>" +
    "• 最大威脅：🐕 流浪犬攻擊（佔 50% 以上）<br>" +
    "• 守護行動：🚗 減速慢行、📞 發現通報、🌳 支持友善農作";

  playFanfare();
  startConfetti();
}

function restartGame() {
  clearTimer();
  stopConfetti();
  currentStage = 0;
  score = 0;
  selected = false;
  resultData = [];
  document.getElementById("scoreDisplay").textContent = "0";
  document.getElementById("sceneArea").style.display = "block";
  document.getElementById("resultScreen").classList.remove("show");
  renderStage();
}

renderStage();
</script>
